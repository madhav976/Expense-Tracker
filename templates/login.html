{% extends "base.html" %}

{% block title %}Log In - Expense Tracker{% endblock %}

{% block auth_content %}
<div class="card auth-card">
    <div class="auth-header">
        <h1 class="auth-title">Log in to your account</h1>
        <p class="auth-subtitle">Welcome back! Please enter your details.</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" required autofocus placeholder="Enter your name">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <span style="color: var(--text-muted); font-size: 0.875rem;">Don't have an account?</span>
        <a href="{{ url_for('signup') }}" style="color: var(--primary); font-weight: 500; text-decoration: none; font-size: 0.875rem;">Sign up</a>
    </div>
</div>
{% endblock %}
