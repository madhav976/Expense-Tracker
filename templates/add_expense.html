{% extends "base.html" %}

{% block title %}Add Expense - Expense Tracker{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem; color: var(--text-main);">Add Expense</h2>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('add_expense') }}">
        <div class="form-group">
            <label class="form-label" for="item_name">Item Name</label>
            <input type="text" id="item_name" name="item_name" class="form-control" required placeholder="What did you buy?">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="amount">Amount ($)</label>
            <input type="number" step="0.01" id="amount" name="amount" class="form-control" required placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" name="category" class="form-control" required>
                <option value="" disabled selected>Select a category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Others">Others</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="purchase_date">Purchase Date</label>
            <input type="date" id="purchase_date" name="purchase_date" class="form-control" required>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Expense</button>
            <a href="{{ url_for('dashboard') }}" class="btn" style="background-color: var(--bg-light); color: var(--text-main); border: 1px solid var(--border-color);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
